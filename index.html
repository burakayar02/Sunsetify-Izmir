<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İzmir Gün Batımı Seçici</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, orange, pink);
}
.container {
  margin-top: 50px;
}
select, button {
  padding: 10px;
  margin: 10px;
}
#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
<h1>🌅 Gün Batımını Nerede İzlemelisin?</h1>

<select id="budget">
<option value="">Bütçe</option>
<option>düşük</option>
<option>orta</option>
<option>yüksek</option>
</select>

<select id="transport">
<option value="">Ulaşım</option>
<option>yürüyüş</option>
<option>toplu</option>
<option>araba</option>
</select>

<select id="crowd">
<option value="">Kalabalık toleransı</option>
<option>düşük</option>
<option>orta</option>
<option>yüksek</option>
</select>

<select id="view">
<option value="">Manzara</option>
<option>deniz</option>
<option>şehir</option>
<option>doğa</option>
</select>

<select id="time">
<option value="">Süre</option>
<option>kısa</option>
<option>uzun</option>
</select>

<br>
<button onclick="recommend()">Öneri Al</button>

<div id="result"></div>
</div>

<script>
function recommend() {
  let B = document.getElementById("budget").value;
  let U = document.getElementById("transport").value;
  let K = document.getElementById("crowd").value;
  let M = document.getElementById("view").value;
  let S = document.getElementById("time").value;

  let result = "Uygun öneri bulunamadı.";

  if (B=="düşük" && U=="yürüyüş" && K=="düşük") {
    result = "Karşıyaka Sahil";
  }
  else if (B=="orta" && U=="toplu" && M=="şehir") {
    result = "Asansör";
  }
  else if (B=="yüksek" && U=="araba" && M=="doğa") {
    result = "Sasalı";
  }
  else if (K=="yüksek" && M=="deniz" && S=="uzun") {
    result = "İnciraltı";
  }
  else if (U=="yürüyüş" && M=="şehir" && S=="kısa") {
    result = "Kordon";
  }
  else if (B=="orta" && K=="düşük" && M=="deniz") {
    result = "Bostanlı";
  }
  else if (U=="toplu" && S=="uzun" && M=="doğa") {
    result = "Foça";
  }
  else if (B=="düşük" && K=="yüksek" && M=="şehir") {
    result = "Konak Meydanı";
  }

  document.getElementById("result").innerText = "Önerilen yer: " + result;
}
</script>

</body>
</html>
