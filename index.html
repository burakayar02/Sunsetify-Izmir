<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir Gün Batımı Seçici</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #ff6b6b; font-size: 26px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
        }
        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover { background-color: #ee5253; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #fff5f5;
            color: #2d3436;
            font-size: 16px;
            line-height: 1.5;
            border-left: 5px solid #ff6b6b;
            min-height: 40px;
            display: none; /* Başta gizli kalsın */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌅 Sunsetify İzmir</h1>
    <p>Moduna göre en iyi gün batımı noktasını bulalım.</p>

    <!-- Decision Points (Min. 5 Adet) -->
    <select id="budget">
        <option value="düşük">Bütçe: Düşük (Ücretsiz)</option>
        <option value="orta">Bütçe: Orta (Kafe/Çay)</option>
        <option value="yüksek">Bütçe: Yüksek (Restoran)</option>
    </select>

    <select id="transport">
        <option value="yürüyüş">Ulaşım: Yürüyerek</option>
        <option value="toplu">Ulaşım: Toplu Taşıma</option>
        <option value="araba">Ulaşım: Şahsi Araç</option>
    </select>

    <select id="crowd">
        <option value="düşük">Ortam: Sakinlik</option>
        <option value="orta">Ortam: Hareketli</option>
        <option value="yüksek">Ortam: Cıvıl Cıvıl</option>
    </select>

    <select id="view">
        <option value="deniz">Manzara: Deniz</option>
        <option value="şehir">Manzara: Şehir</option>
        <option value="doğa">Manzara: Doğa</option>
    </select>

    <select id="time">
        <option value="kısa">Vakit: Kısıtlı</option>
        <option value="uzun">Vakit: Bol</option>
    </select>

    <button onclick="recommend()">Mükemmel Noktayı Bul</button>

    <div id="result"></div>
</div>

<script>
function recommend() {
    // Mantıksal Değişken Tanımları (Logic Variables)
    let B = document.getElementById("budget").value;
    let U = document.getElementById("transport").value;
    let K = document.getElementById("crowd").value;
    let M = document.getElementById("view").value;
    let S = document.getElementById("time").value;

    let displayArea = document.getElementById("result");
    displayArea.style.display = "block"; // Sonuç alanını görünür yap

    let text = "";

    // MANTIK DİZGİLERİ (8 Unique Strings)
    if (B=="düşük" && U=="yürüyüş" && K=="düşük") {
        text = "📍 Mavişehir Balıkçı Barınağı: Tamamen ücretsiz, sessiz ve denizin dibinde huzur dolu bir köşe.";
    } 
    else if (B=="orta" && U=="toplu" && M=="şehir") {
        text = "📍 Tarihi Asansör: İzmir'i tepeden gören, nostaljik ve ulaşımı kolay bir klasik.";
    }
    else if (B=="yüksek" && U=="araba" && M=="doğa") {
        text = "📍 Urla Bağ Yolu: Doğanın kalbinde, seçkin bir akşam yemeği eşliğinde eşsiz gün batımı.";
    }
    else if (K=="yüksek" && M=="deniz" && S=="uzun") {
        text = "📍 Güzelyalı Sahili: İzmir'in genç enerjisini hissedeceğin, kıpır kıpır bir sahil şeridi.";
    }
    else if (U=="yürüyüş" && M=="şehir" && S=="kısa") {
        text = "📍 Pasaport İskelesi: Vaktin darsa hemen kordon boyuna geç ve denize karşı bir nefes al.";
    }
    else if (B=="orta" && K=="düşük" && M=="deniz") {
        text = "📍 Sahilevleri: Kalabalıktan kaçmak isteyenler için butik kafelerle dolu huzurlu bir rota.";
    }
    else if (U=="toplu" && S=="uzun" && M=="doğa") {
        text = "📍 İnciraltı Kent Ormanı: Şehrin içinde bir orman kaçamağı. Piknikle günü batırabilirsin.";
    }
    else if (B=="düşük" && K=="yüksek" && M=="şehir") {
        text = "📍 Konak Meydanı: Saat kulesi altında, İzmir'in kalbinde cıvıl cıvıl bir akşamüstü.";
    }
    else {
        // Herhangi bir seçimde boş kalmaması için Joker seçenek
        text = "📍 Bostanlı Gün Batımı Terası: Minderine kurul ve İzmir'in o meşhur turuncu güneşini izle!";
    }

    displayArea.innerText = text;
}
</script>

</body>
</html>
